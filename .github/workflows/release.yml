name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-unknown-freebsd

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for x86_64-unknown-linux-gnu
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build for x86_64-unknown-freebsd
        run: cross build --release --target x86_64-unknown-freebsd

      - name: Package release
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/opncheck "dist/opncheck-x86_64-unknown-linux-gnu"
          cp target/x86_64-unknown-freebsd/release/opncheck "dist/opncheck-x86_64-unknown-freebsd"
          cp opncheck.example.toml dist/opncheck.example.toml

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

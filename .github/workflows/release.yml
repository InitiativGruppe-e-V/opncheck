name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-freebsd
          cache-targets: true
          cache-on-failure: true

      - name: Cache cross binary
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          # Bump the suffix to force a rebuild of cross against latest master.
          key: cross-${{ runner.os }}-git-master-v1

      - name: Install cross
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for x86_64-unknown-freebsd
        run: cross build --release --target x86_64-unknown-freebsd

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp target/x86_64-unknown-freebsd/release/opncheck dist/
          cp opncheck.example.toml dist/
          cp install.sh dist/
          cd dist
          tar czf "../opncheck-${VERSION}-x86_64-unknown-freebsd.tar.gz" .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: opncheck-*-x86_64-unknown-freebsd.tar.gz
